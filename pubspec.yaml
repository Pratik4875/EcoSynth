name: smart_garden_iot
description: "EcoSynth — Real-time IoT Control Dashboard for ESP8266 Smart Irrigation Systems. Built with Flutter + Firebase Realtime Database."
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.13.0
  firebase_database: ^11.3.5
  shared_preferences: ^2.3.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
